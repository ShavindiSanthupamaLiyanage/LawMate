name: LawMate CI/CD

on:
  push:
    branches:
      - development
      - qa
      - main

jobs:

# -------------------------
# BACKEND BUILD + TEST
# -------------------------
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # Optional: cache NuGet packages for faster restore
      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore LawMateBackend/LawMateBackend.sln

      - name: Build
        run: dotnet build LawMateBackend/LawMateBackend.sln --no-restore

      - name: Run xUnit Tests
        run: dotnet test LawMateBackend/LawMateBackend.sln --no-build

# -------------------------
# BUILD REACT NATIVE APK
# -------------------------
  mobile:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LawMateMobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Optional: cache node_modules for faster builds
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: LawMateMobile/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('LawMateMobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LawMate-APK
          path: LawMateMobile/android/app/build/outputs/apk/release/app-release.apk

# -------------------------
# DEPLOY TO AZURE (QA)
# -------------------------
  deploy-qa:
    if: github.event.pull_request.merged == true && github.ref == 'refs/heads/qa'
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Publish .NET API
        run: dotnet publish LawMateBackend/LawMateBackend.sln -c Release -o publish

      - name: Deploy to Azure (QA)
        uses: azure/webapps-deploy@v2
        with:
          app-name: lawmate-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish

# -------------------------
# DEPLOY TO PRODUCTION
# -------------------------
  deploy-prod:
    if: github.event.pull_request.merged == true && github.ref == 'refs/heads/main'
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Publish .NET API
        run: dotnet publish LawMateBackend/LawMateBackend.sln -c Release -o publish

      - name: Deploy to Azure (PROD)
        uses: azure/webapps-deploy@v2
        with:
          app-name: lawmate-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish